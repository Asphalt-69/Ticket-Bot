version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: ticketbot-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - '27017:27017'
  app:
    build: .
    container_name: ticketbot-app
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '3000:3000'
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MONGODB_URI=mongodb://mongo:27017/ticketbot
      - PORT=3000
      - BOT_PREFIX=$
      - ADMIN_ROLE_ID=${ADMIN_ROLE_ID}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - GUILD_ID=${GUILD_ID}
      - TICKET_LOG_CHANNEL_ID=${TICKET_LOG_CHANNEL_ID}
volumes:
  mongo-data:
